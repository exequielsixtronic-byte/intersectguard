<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Radar HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --hud: #11ff77;
    --danger: #ff2a2a;
    --dim: rgba(17, 255, 119, 0.42);
    --dim-danger: rgba(255, 42, 42, 0.65);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: var(--bg);
    color: var(--hud);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    overflow: hidden;
    user-select: none;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
    background:
      repeating-linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.04) 0px,
        rgba(255, 255, 255, 0.04) 1px,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0) 4px
      );
    animation: crtScan 7s linear infinite;
    mix-blend-mode: screen;
  }

  @keyframes crtScan {
    from { transform: translateY(-12px); }
    to { transform: translateY(12px); }
  }

  .hud-shell {
    position: relative;
    width: 100vw;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .top-edge, .bottom-edge {
    width: min(1100px, 96vw);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(9px, 1.35vw, 12px);
    letter-spacing: 1.7px;
    text-transform: uppercase;
    color: var(--dim);
    z-index: 20;
  }

  .top-edge {
    margin-top: 8px;
  }

  .bottom-edge {
    margin-bottom: 8px;
  }

  .edge-block {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(17, 255, 119, 0.28);
    padding: 4px 8px;
    background: rgba(0, 0, 0, 0.5);
    min-height: 28px;
  }

  .edge-block.danger {
    color: var(--dim-danger);
    border-color: rgba(255, 42, 42, 0.45);
  }

  .radar-frame {
    position: relative;
    width: min(96vw, 96vh);
    height: min(96vw, 96vh);
    max-height: 80dvh;
    max-width: 80vw;
    min-width: 300px;
    min-height: 300px;
    border: 1px solid rgba(17, 255, 119, 0.3);
    box-shadow:
      0 0 28px rgba(17, 255, 119, 0.18),
      inset 0 0 42px rgba(17, 255, 119, 0.06);
    z-index: 10;
  }

  #radar {
    width: 100%;
    height: 100%;
    display: block;
    background: #000;
  }

  .radar-sweep {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 30;
    overflow: hidden;
  }

  .radar-sweep::before {
    content: "";
    position: absolute;
    width: 70%;
    height: 2px;
    left: -80%;
    top: 35%;
    background: linear-gradient(90deg, rgba(17,255,119,0), rgba(17,255,119,0.75), rgba(17,255,119,0));
    filter: blur(0.5px);
    animation: sweepH 2.2s linear infinite;
  }

  .radar-sweep::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 80%;
    top: -90%;
    left: 62%;
    background: linear-gradient(180deg, rgba(17,255,119,0), rgba(17,255,119,0.7), rgba(17,255,119,0));
    animation: sweepV 2.8s linear infinite;
  }

  @keyframes sweepH {
    0% { left: -80%; }
    100% { left: 110%; }
  }

  @keyframes sweepV {
    0% { top: -90%; }
    100% { top: 110%; }
  }

  .corner-text {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(9px, 1.2vw, 11px);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
    z-index: 40;
    padding: 4px 6px;
    background: rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(17,255,119,0.22);
  }

  .corner-top-left { top: 8px; left: 8px; }
  .corner-top-right { top: 8px; right: 8px; text-align: right; }
  .corner-bottom-left { bottom: 8px; left: 8px; }
  .corner-bottom-right { bottom: 8px; right: 8px; text-align: right; }

  .distance-nav {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 45;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    letter-spacing: 2px;
    font-size: clamp(20px, 4.2vw, 46px);
    color: #11ff77;
    text-shadow: 0 0 14px rgba(17, 255, 119, 0.4);
    padding: 2px 10px;
    border: 1px solid rgba(17,255,119,0.25);
    background: rgba(0, 0, 0, 0.55);
  }

  .distance-nav.alert {
    color: #ff2a2a;
    border-color: rgba(255, 42, 42, 0.45);
    text-shadow: 0 0 16px rgba(255, 42, 42, 0.55);
  }

  .direction-nav {
    position: absolute;
    top: 64px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 45;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(10px, 1.5vw, 16px);
    color: rgba(17, 255, 119, 0.8);
    letter-spacing: 1.4px;
    padding: 2px 8px;
    border: 1px solid rgba(17,255,119,0.2);
    background: rgba(0, 0, 0, 0.4);
  }

  .panel-inline {
    display: inline-flex;
    gap: 6px;
    align-items: center;
  }

  #roomCodeInput {
    width: 72px;
    background: #000;
    border: 1px solid rgba(17,255,119,0.35);
    color: var(--hud);
    padding: 4px 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    outline: none;
  }

  .btn {
    border: 1px solid rgba(17,255,119,0.35);
    background: rgba(0, 0, 0, 0.75);
    color: var(--hud);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 6px 9px;
    cursor: pointer;
  }

  .btn:active { transform: scale(0.98); }

  #soundBtn.enabled {
    color: #001407;
    background: var(--hud);
    border-color: var(--hud);
    box-shadow: 0 0 16px rgba(17, 255, 119, 0.45);
  }

  .danger-text { color: var(--danger); }
</style>
</head>
<body>
<div class="hud-shell">
  <div class="top-edge">
    <div class="edge-block">
      <span>INTERSECT HUD</span>
      <span id="gpsStatus">GPS INICIALIZANDO</span>
    </div>
    <div class="edge-block panel-inline">
      <span>SALA</span>
      <span id="roomCodeDisplay">----</span>
      <input id="roomCodeInput" type="text" inputmode="numeric" maxlength="4" placeholder="0000">
      <button class="btn" id="joinRoomBtn" onclick="joinRoom()">UNIR</button>
    </div>
  </div>

  <div class="radar-frame">
    <canvas id="radar"></canvas>
    <div class="radar-sweep"></div>
    <div class="distance-nav" id="navDistance">---</div>
    <div class="direction-nav" id="dirHint">SIN OBJETIVO</div>
    <div class="corner-text corner-top-left" id="distTxt">DIST: ---</div>
    <div class="corner-text corner-top-right" id="riskTxt">RIESGO: BAJO</div>
    <div class="corner-text corner-bottom-left" id="coordsTxt">LAT/LNG: ---</div>
    <div class="corner-text corner-bottom-right" id="roomTxt">SALA ----</div>
  </div>

  <div class="bottom-edge">
    <div class="edge-block">
      <span>AUTO B</span>
      <span id="otherSpeed">VEL ---</span>
      <span id="otherHeading">HDG ---</span>
    </div>
    <div class="edge-block">
      <button class="btn" id="soundBtn">ACTIVAR SONIDO</button>
      <span id="soundStatus">AUDIO BLOQUEADO</span>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAhNFOlbATXx0EZR--ofTHsmTw9d4vT0QI",
  authDomain: "intersectguard.firebaseapp.com",
  projectId: "intersectguard",
  storageBucket: "intersectguard.firebasestorage.app",
  messagingSenderId: "155570860492",
  appId: "1:155570860492:web:7b2505a77772a51452ed69"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');

const RANGE_M = 150;
const deviceId = Math.random().toString(36).slice(2, 10);
const generatedRoomCode = String(Math.floor(Math.random() * 9000) + 1000);

let activeRoomCode = generatedRoomCode;
let roomRef = null;
let roomListener = null;
let publishTimer = null;
let renderFrame = null;

let gpsActive = false;
let myGPS = { lat: -24.7821, lng: -65.4232 };
let otherGPS = null;
let remoteSpeed = 0;
let myHeading = 0;
let otherHeading = 270;
let lastMyFix = null;
let lastOtherFix = null;

let carA = { x: 0, y: 0, heading: 0, speed: 0, color: '#11ff77', label: 'VOS' };
let carB = { x: 85, y: 40, heading: 270, speed: 0, color: '#ff2a2a', label: 'AUTO B' };

let currentDistance = 999;
let currentRisk = { level: 'BAJO', type: 'safe' };

let audioCtx = null;
let audioUnlocked = false;
let nextBeepAt = 0;

document.getElementById('roomCodeDisplay').textContent = generatedRoomCode;
document.getElementById('roomTxt').textContent = `SALA ${activeRoomCode}`;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const ratio = window.devicePixelRatio || 1;
  canvas.width = Math.floor(rect.width * ratio);
  canvas.height = Math.floor(rect.height * ratio);
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  drawRadar(performance.now() * 0.001);
}

window.addEventListener('resize', resizeCanvas);

function normalizeAngle(deg) {
  const v = deg % 360;
  return v < 0 ? v + 360 : v;
}

function bearingDeg(lat1, lng1, lat2, lng2) {
  const toRad = (d) => d * Math.PI / 180;
  const toDeg = (r) => r * 180 / Math.PI;
  const y = Math.sin(toRad(lng2 - lng1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
    Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lng2 - lng1));
  return normalizeAngle(toDeg(Math.atan2(y, x)));
}

function haversineMeters(lat1, lng1, lat2, lng2) {
  const toRad = (d) => d * Math.PI / 180;
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function gpsDeltaMeters(lat1, lng1, lat2, lng2) {
  const R = 6378137;
  const dLat = (lat2 - lat1) * (Math.PI / 180);
  const dLng = (lng2 - lng1) * (Math.PI / 180);
  const avgLat = ((lat1 + lat2) / 2) * (Math.PI / 180);
  return {
    east: dLng * R * Math.cos(avgLat),
    north: dLat * R
  };
}

function calcRisk(dist) {
  if (dist < 30) return { level: 'CRITICO', type: 'danger' };
  if (dist < 90) return { level: 'ALTO', type: 'warn' };
  return { level: 'BAJO', type: 'safe' };
}

function updateTelemetryUI() {
  const distText = currentDistance > 900 ? '>150m' : `${Math.round(currentDistance)}m`;
  document.getElementById('distTxt').textContent = `DIST: ${distText}`;
  document.getElementById('riskTxt').textContent = `RIESGO: ${currentRisk.level}`;
  document.getElementById('riskTxt').classList.toggle('danger-text', currentRisk.type === 'danger');
  document.getElementById('coordsTxt').textContent = `LAT/LNG: ${myGPS.lat.toFixed(5)}, ${myGPS.lng.toFixed(5)}`;
  document.getElementById('roomTxt').textContent = `SALA ${activeRoomCode}`;
  document.getElementById('otherSpeed').textContent = `VEL ${Math.round(remoteSpeed)} km/h`;
  document.getElementById('otherHeading').textContent = `HDG ${Math.round(otherHeading)}°`;
  const navDistance = document.getElementById('navDistance');
  navDistance.textContent = distText;
  navDistance.classList.toggle('alert', currentDistance < 90);
}

function updateCarsFromGPS() {
  carA.x = 0;
  carA.y = 0;
  carA.heading = myHeading;
  carA.speed = 0;
  if (otherGPS) {
    const delta = gpsDeltaMeters(myGPS.lat, myGPS.lng, otherGPS.lat, otherGPS.lng);
    carB.x = delta.east;
    carB.y = delta.north;
    carB.heading = otherHeading;
    carB.speed = remoteSpeed;
    currentDistance = haversineMeters(myGPS.lat, myGPS.lng, otherGPS.lat, otherGPS.lng);
  } else {
    carB.x = 9999;
    carB.y = 9999;
    carB.speed = 0;
    currentDistance = 999;
  }
  currentRisk = calcRisk(currentDistance);
  updateTelemetryUI();
  drawRadar(performance.now() * 0.001);
}

function publishMyPosition() {
  if (!gpsActive || !activeRoomCode) return;
  db.ref(`rooms/${activeRoomCode}/${deviceId}`).set({
    lat: myGPS.lat,
    lng: myGPS.lng,
    speed: Number(carA.speed) || 0,
    heading: Number(myHeading) || 0,
    updatedAt: Date.now()
  });
}

function startRealtimePublishing() {
  if (publishTimer) clearInterval(publishTimer);
  publishTimer = setInterval(() => {
    publishMyPosition();
  }, 3000);
}

function subscribeToRoom() {
  if (roomRef && roomListener) roomRef.off('value', roomListener);
  roomRef = db.ref(`rooms/${activeRoomCode}`);
  roomListener = (snapshot) => {
    const data = snapshot.val() || {};
    const otherDevice = Object.keys(data).find((id) => id !== deviceId);
    if (!otherDevice) {
      otherGPS = null;
      remoteSpeed = 0;
      updateCarsFromGPS();
      return;
    }
    const payload = data[otherDevice];
    if (!payload || typeof payload.lat !== 'number' || typeof payload.lng !== 'number') return;
    if (lastOtherFix) {
      const moved = haversineMeters(lastOtherFix.lat, lastOtherFix.lng, payload.lat, payload.lng);
      if (moved > 1.4) {
        otherHeading = bearingDeg(lastOtherFix.lat, lastOtherFix.lng, payload.lat, payload.lng);
      }
    }
    lastOtherFix = { lat: payload.lat, lng: payload.lng };
    otherGPS = { lat: payload.lat, lng: payload.lng };
    remoteSpeed = Number(payload.speed) || 0;
    if (typeof payload.heading === 'number' && Number.isFinite(payload.heading)) {
      otherHeading = normalizeAngle(payload.heading);
    }
    updateCarsFromGPS(); // redibujo inmediato al recibir Firebase
  };
  roomRef.on('value', roomListener);
}

function joinRoom() {
  const input = document.getElementById('roomCodeInput');
  const value = (input.value || '').trim();
  if (!/^\d{4}$/.test(value)) return;
  activeRoomCode = value;
  document.getElementById('roomCodeDisplay').textContent = activeRoomCode;
  subscribeToRoom();
  publishMyPosition();
  updateTelemetryUI();
}

function drawCarIcon(x, y, headingDeg, color, label, sizeFactor = 1) {
  const size = Math.max(14, canvas.clientWidth * 0.028) * sizeFactor;
  const w = size;
  const h = size * 1.85;
  const r = size * 0.2;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate((headingDeg * Math.PI) / 180);

  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, h * 1.6);
  glow.addColorStop(0, color + '44');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, h * 1.55, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = color;
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, -h / 2);
  ctx.lineTo(w / 2 - r, -h / 2 + r);
  ctx.quadraticCurveTo(w / 2, -h / 2 + r, w / 2, -h / 2 + r * 1.6);
  ctx.lineTo(w / 2, h / 2 - r * 1.2);
  ctx.quadraticCurveTo(w / 2, h / 2, w / 2 - r, h / 2);
  ctx.lineTo(-w / 2 + r, h / 2);
  ctx.quadraticCurveTo(-w / 2, h / 2, -w / 2, h / 2 - r * 1.2);
  ctx.lineTo(-w / 2, -h / 2 + r * 1.6);
  ctx.quadraticCurveTo(-w / 2, -h / 2 + r, -w / 2 + r, -h / 2 + r);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#09100a';
  ctx.fillRect(-w * 0.3, -h * 0.25, w * 0.6, h * 0.28);
  ctx.fillRect(-w * 0.27, h * 0.12, w * 0.54, h * 0.18);

  ctx.fillStyle = '#000';
  const tireW = w * 0.13;
  const tireH = h * 0.19;
  ctx.fillRect(-w / 2 - tireW * 0.5, -h * 0.34, tireW, tireH);
  ctx.fillRect(w / 2 - tireW * 0.5, -h * 0.34, tireW, tireH);
  ctx.fillRect(-w / 2 - tireW * 0.5, h * 0.14, tireW, tireH);
  ctx.fillRect(w / 2 - tireW * 0.5, h * 0.14, tireW, tireH);

  ctx.restore();

  ctx.fillStyle = color;
  ctx.font = `bold ${Math.max(10, canvas.clientWidth * 0.014)}px Orbitron`;
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y - h * 1.05);
}

function getViewFromWorld(east, north) {
  const yaw = (myHeading * Math.PI) / 180;
  const c = Math.cos(yaw);
  const s = Math.sin(yaw);
  return {
    x: east * c - north * s,
    z: east * s + north * c
  };
}

function projectViewPoint(vx, vz, w, h) {
  if (vz < -18) return null;
  const cx = w / 2;
  const baseY = h * 0.88;
  const horizonY = h * 0.2;
  const zClamped = Math.max(vz, -18);
  const depth = Math.min(Math.max((zClamped + 18) / (RANGE_M + 18), 0), 1);
  const scale = 1.4 - depth * 1.08;
  return {
    x: cx + vx * scale * 1.22,
    y: baseY - depth * (baseY - horizonY),
    depth,
    scale
  };
}

function drawRoadLane(worldPoints, w, h, color, width = 1.2, dashed = false) {
  let started = false;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  if (dashed) ctx.setLineDash([5, 7]);
  ctx.beginPath();
  for (const p of worldPoints) {
    const view = getViewFromWorld(p.east, p.north);
    const screen = projectViewPoint(view.x, view.z, w, h);
    if (!screen) continue;
    if (!started) {
      ctx.moveTo(screen.x, screen.y);
      started = true;
    } else {
      ctx.lineTo(screen.x, screen.y);
    }
  }
  if (started) ctx.stroke();
  if (dashed) ctx.setLineDash([]);
}

function drawPerspectiveRoads(w, h) {
  ctx.fillStyle = 'rgba(17, 255, 119, 0.08)';
  ctx.fillRect(0, h * 0.2, w, h * 0.8);

  const axisMain = [];
  const axisCross = [];
  const edgeLeftA = [];
  const edgeRightA = [];
  const edgeLeftB = [];
  const edgeRightB = [];
  const laneA1 = [];
  const laneA2 = [];
  const laneB1 = [];
  const laneB2 = [];

  for (let d = -20; d <= RANGE_M + 40; d += 8) {
    axisMain.push({ east: 0, north: d });
    edgeLeftA.push({ east: -11, north: d });
    edgeRightA.push({ east: 11, north: d });
    laneA1.push({ east: -3.5, north: d });
    laneA2.push({ east: 3.5, north: d });
  }
  for (let d = -80; d <= 80; d += 8) {
    axisCross.push({ east: d, north: 0 });
    edgeLeftB.push({ east: d, north: -11 });
    edgeRightB.push({ east: d, north: 11 });
    laneB1.push({ east: d, north: -3.5 });
    laneB2.push({ east: d, north: 3.5 });
  }

  drawRoadLane(edgeLeftA, w, h, 'rgba(17,255,119,0.26)', 1.3);
  drawRoadLane(edgeRightA, w, h, 'rgba(17,255,119,0.26)', 1.3);
  drawRoadLane(edgeLeftB, w, h, 'rgba(17,255,119,0.22)', 1.2);
  drawRoadLane(edgeRightB, w, h, 'rgba(17,255,119,0.22)', 1.2);

  drawRoadLane(laneA1, w, h, 'rgba(17,255,119,0.22)', 1, true);
  drawRoadLane(laneA2, w, h, 'rgba(17,255,119,0.22)', 1, true);
  drawRoadLane(laneB1, w, h, 'rgba(17,255,119,0.18)', 1, true);
  drawRoadLane(laneB2, w, h, 'rgba(17,255,119,0.18)', 1, true);

  drawRoadLane(axisMain, w, h, 'rgba(17,255,119,0.34)', 1.5);
  drawRoadLane(axisCross, w, h, 'rgba(17,255,119,0.22)', 1.2);
}

function updateDirectionHint(viewX, viewZ) {
  const el = document.getElementById('dirHint');
  if (currentDistance > 900 || !Number.isFinite(viewX) || !Number.isFinite(viewZ)) {
    el.textContent = 'SIN OBJETIVO';
    return;
  }
  const rel = Math.atan2(viewX, viewZ) * 180 / Math.PI;
  const absDeg = Math.abs(rel);
  let zone = 'FRENTE';
  if (rel < -18) zone = absDeg > 145 ? 'ATRAS' : 'IZQ';
  else if (rel > 18) zone = absDeg > 145 ? 'ATRAS' : 'DER';
  const arrow = rel < -12 ? '↖' : rel > 12 ? '↗' : '↑';
  el.textContent = `${arrow} ${zone} ${Math.round(absDeg)}°`;
}

function drawDirectionArrow(w, h, viewX, viewZ) {
  if (currentDistance > 900 || !Number.isFinite(viewX) || !Number.isFinite(viewZ)) return;
  const rel = Math.atan2(viewX, viewZ);
  const x = w * 0.5;
  const y = h * 0.14;
  const size = Math.max(16, w * 0.02);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rel);
  ctx.strokeStyle = currentDistance < 90 ? 'rgba(255,42,42,0.9)' : 'rgba(17,255,119,0.8)';
  ctx.fillStyle = currentDistance < 90 ? 'rgba(255,42,42,0.9)' : 'rgba(17,255,119,0.8)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size * 0.5, size * 0.5);
  ctx.lineTo(0, size * 0.2);
  ctx.lineTo(-size * 0.5, size * 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawRadar(timeSec) {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const horizonY = h * 0.2;
  const baseY = h * 0.88;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, w, h);

  const sky = ctx.createLinearGradient(0, 0, 0, h);
  sky.addColorStop(0, 'rgba(17,255,119,0.03)');
  sky.addColorStop(0.22, 'rgba(17,255,119,0.08)');
  sky.addColorStop(0.24, 'rgba(17,255,119,0.15)');
  sky.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h);

  ctx.strokeStyle = 'rgba(17,255,119,0.35)';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(0, horizonY);
  ctx.lineTo(w, horizonY);
  ctx.stroke();

  drawPerspectiveRoads(w, h);

  const sweepX = ((timeSec * 0.24) % 1) * w;
  const beamGrad = ctx.createLinearGradient(sweepX - 120, horizonY, sweepX + 120, h);
  beamGrad.addColorStop(0, 'rgba(17,255,119,0)');
  beamGrad.addColorStop(0.5, 'rgba(17,255,119,0.13)');
  beamGrad.addColorStop(1, 'rgba(17,255,119,0)');
  ctx.save();
  ctx.fillStyle = beamGrad;
  ctx.fillRect(0, horizonY, w, h - horizonY);
  ctx.restore();

  const vosX = w * 0.5;
  const vosY = baseY;
  drawCarIcon(vosX, vosY, 0, '#11ff77', 'VOS', 1.18);

  let viewBX = NaN;
  let viewBZ = NaN;
  if (Math.abs(carB.x) < RANGE_M * 2 && Math.abs(carB.y) < RANGE_M * 2) {
    const view = getViewFromWorld(carB.x, carB.y);
    viewBX = view.x;
    viewBZ = view.z;
    const projected = projectViewPoint(view.x, view.z, w, h);
    if (projected) {
      const relHeading = normalizeAngle(otherHeading - myHeading);
      drawCarIcon(projected.x, projected.y, relHeading, '#ff2a2a', 'AUTO B', projected.scale);

      if (currentDistance < 150) {
      ctx.strokeStyle = currentDistance < 90 ? 'rgba(255,42,42,0.75)' : 'rgba(17,255,119,0.35)';
      ctx.setLineDash([5, 6]);
      ctx.beginPath();
      ctx.moveTo(vosX, vosY);
      ctx.lineTo(projected.x, projected.y);
      ctx.stroke();
      ctx.setLineDash([]);
      }
    }
  }

  updateDirectionHint(viewBX, viewBZ);
  drawDirectionArrow(w, h, viewBX, viewBZ);
}

function runAudioAlerts(nowMs) {
  if (!audioUnlocked || !audioCtx) return;
  if (currentDistance >= 90) return;
  if (nowMs < nextBeepAt) return;

  const urgent = currentDistance < 30;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = urgent ? 'square' : 'sine';
  osc.frequency.value = urgent ? 1450 : 980;
  gain.gain.value = urgent ? 0.11 : 0.06;
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const t0 = audioCtx.currentTime;
  osc.start(t0);
  osc.stop(t0 + (urgent ? 0.07 : 0.11));

  nextBeepAt = nowMs + (urgent ? 200 : 750);
}

function maybeVibrate(nowMs) {
  if (currentDistance >= 30 || !navigator.vibrate) return;
  const slot = Math.floor(nowMs / 850);
  if (maybeVibrate.lastSlot === slot) return;
  maybeVibrate.lastSlot = slot;
  navigator.vibrate([90, 50, 140]);
}
maybeVibrate.lastSlot = -1;

function frame(now) {
  drawRadar(now * 0.001);
  runAudioAlerts(now);
  maybeVibrate(now);
  renderFrame = requestAnimationFrame(frame);
}

function setupAudioUnlock() {
  const button = document.getElementById('soundBtn');
  button.addEventListener('click', async () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state !== 'running') await audioCtx.resume();
    audioUnlocked = true;
    document.getElementById('soundStatus').textContent = 'AUDIO ACTIVO';
    button.classList.add('enabled');
  });
}

function setupGPS() {
  const gpsStatus = document.getElementById('gpsStatus');
  if (!navigator.geolocation) {
    gpsStatus.textContent = 'GPS NO SOPORTADO';
    return;
  }

  navigator.geolocation.watchPosition((pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    gpsActive = true;

    if (lastMyFix) {
      const moved = haversineMeters(lastMyFix.lat, lastMyFix.lng, lat, lng);
      if (moved > 1.2) {
        myHeading = bearingDeg(lastMyFix.lat, lastMyFix.lng, lat, lng);
      }
    }

    lastMyFix = { lat, lng };
    myGPS.lat = lat;
    myGPS.lng = lng;

    gpsStatus.textContent = 'GPS ACTIVO';
    publishMyPosition(); // publicar en cada cambio detectado
    updateCarsFromGPS();
  }, () => {
    gpsStatus.textContent = 'GPS SIN SENAL';
  }, {
    enableHighAccuracy: true,
    maximumAge: 1200,
    timeout: 12000
  });
}

function cleanUp() {
  if (publishTimer) clearInterval(publishTimer);
  if (renderFrame) cancelAnimationFrame(renderFrame);
  if (activeRoomCode) db.ref(`rooms/${activeRoomCode}/${deviceId}`).remove();
}

window.addEventListener('beforeunload', cleanUp);

setupAudioUnlock();
setupGPS();
subscribeToRoom();
startRealtimePublishing(); // backup cada 3 segundos
resizeCanvas();
updateTelemetryUI();
renderFrame = requestAnimationFrame(frame);
</script>
</body>
