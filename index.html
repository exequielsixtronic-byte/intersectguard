<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mapa Navegacion</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --road: #1a3a5c;
    --road-edge: #0d2a4a;
    --intersection: #1e4a7a;
    --sidewalk: #111111;
    --text: #ffffff;
    --self: #4fc3f7;
    --other: #ef5350;
    --danger: rgba(239, 83, 80, 0.86);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    overflow: hidden;
  }

  .app {
    position: relative;
    width: 100vw;
    height: 100dvh;
  }

  #mapCanvas {
    width: 100%;
    height: 100%;
    display: block;
    background: var(--bg);
  }

  .distance-card {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 40;
    color: #fff;
    background: rgba(0, 0, 0, 0.48);
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    padding: 8px 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 4.2vw, 44px);
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1;
  }

  .danger-banner {
    position: absolute;
    top: 78px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 45;
    background: var(--danger);
    color: #fff;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(11px, 1.4vw, 14px);
    letter-spacing: 1.1px;
    font-weight: 700;
    display: none;
    text-transform: uppercase;
  }

  .danger-banner.show {
    display: block;
  }

  .room-tools {
    position: absolute;
    top: 14px;
    right: 12px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.42);
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 10px;
    padding: 7px 8px;
  }

  #roomCodeInput {
    width: 70px;
    background: #000;
    border: 1px solid rgba(255, 255, 255, 0.22);
    color: #fff;
    padding: 5px 6px;
    border-radius: 7px;
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    outline: none;
  }

  .btn {
    border: 1px solid rgba(255, 255, 255, 0.24);
    background: rgba(0, 0, 0, 0.66);
    color: #fff;
    border-radius: 8px;
    padding: 6px 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    cursor: pointer;
  }

  .btn:active {
    transform: scale(0.98);
  }

  #soundBtn.enabled {
    background: #fff;
    color: #0a0a0a;
    border-color: #fff;
  }

  .panel {
    position: absolute;
    z-index: 35;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 9px;
    padding: 6px 8px;
    color: #fff;
    font-size: clamp(10px, 1.2vw, 12px);
  }

  .panel-left-bottom {
    left: 12px;
    bottom: 12px;
  }

  .panel-right-bottom {
    right: 12px;
    bottom: 12px;
    text-transform: uppercase;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 0.9px;
  }

  .panel-left-top {
    left: 12px;
    top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4fc3f7;
    box-shadow: 0 0 8px rgba(79, 195, 247, 0.65);
  }

  .small {
    opacity: 0.85;
    font-size: 11px;
  }
</style>
</head>
<body>
<div class="app">
  <canvas id="mapCanvas"></canvas>

  <div class="distance-card" id="distanceCard">---</div>
  <div class="danger-banner" id="dangerBanner">PELIGRO CERCANO</div>

  <div class="room-tools">
    <input id="roomCodeInput" type="text" inputmode="numeric" maxlength="4" placeholder="0000">
    <button class="btn" onclick="joinRoom()">UNIRSE</button>
    <button class="btn" id="soundBtn">ACTIVAR SONIDO</button>
  </div>

  <div class="panel panel-left-top">
    <div class="status-dot"></div>
    <span id="gpsStatus">GPS INICIANDO</span>
  </div>

  <div class="panel panel-left-bottom" id="coordsText">LAT/LNG: ---, ---</div>
  <div class="panel panel-right-bottom" id="roomText">SALA ----</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAhNFOlbATXx0EZR--ofTHsmTw9d4vT0QI",
  authDomain: "intersectguard.firebaseapp.com",
  projectId: "intersectguard",
  storageBucket: "intersectguard.firebasestorage.app",
  messagingSenderId: "155570860492",
  appId: "1:155570860492:web:7b2505a77772a51452ed69"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

const RANGE_M = 150;
const deviceId = Math.random().toString(36).slice(2, 10);
const generatedRoomCode = String(Math.floor(Math.random() * 9000) + 1000);

let activeRoomCode = generatedRoomCode;
let roomRef = null;
let roomListener = null;
let publishTimer = null;
let rafId = null;

let gpsActive = false;
let myGPS = { lat: -24.7821, lng: -65.4232 };
let otherGPS = null;
let myHeading = 0;
let otherHeading = 270;
let remoteSpeed = 0;
let mySpeed = 0;
let currentDistance = 999;
let currentRisk = { level: 'BAJO', type: 'safe' };

let lastMyFix = null;
let lastOtherFix = null;

let carA = { x: 0, y: 0, heading: 0, color: '#4fc3f7', label: 'VOS' };
let carB = { x: 9999, y: 9999, heading: 270, color: '#ef5350', label: 'AUTO B' };

let audioCtx = null;
let audioUnlocked = false;
let nextBeepAt = 0;

document.getElementById('roomText').textContent = `SALA ${activeRoomCode}`;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const ratio = window.devicePixelRatio || 1;
  canvas.width = Math.floor(rect.width * ratio);
  canvas.height = Math.floor(rect.height * ratio);
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  drawMap();
}

window.addEventListener('resize', resizeCanvas);

function normalizeAngle(deg) {
  const v = deg % 360;
  return v < 0 ? v + 360 : v;
}

function bearingDeg(lat1, lng1, lat2, lng2) {
  const toRad = (d) => d * Math.PI / 180;
  const toDeg = (r) => r * 180 / Math.PI;
  const y = Math.sin(toRad(lng2 - lng1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
    Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lng2 - lng1));
  return normalizeAngle(toDeg(Math.atan2(y, x)));
}

function haversineMeters(lat1, lng1, lat2, lng2) {
  const toRad = (d) => d * Math.PI / 180;
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function gpsDeltaMeters(lat1, lng1, lat2, lng2) {
  const R = 6378137;
  const dLat = (lat2 - lat1) * (Math.PI / 180);
  const dLng = (lng2 - lng1) * (Math.PI / 180);
  const avgLat = ((lat1 + lat2) / 2) * (Math.PI / 180);
  return {
    east: dLng * R * Math.cos(avgLat),
    north: dLat * R
  };
}

function calcRisk(dist) {
  if (dist < 30) return { level: 'CRITICO', type: 'danger' };
  if (dist < 90) return { level: 'ALTO', type: 'warn' };
  return { level: 'BAJO', type: 'safe' };
}

function updateOverlay() {
  const distText = currentDistance > 900 ? '>150m' : `${Math.round(currentDistance)}m`;
  document.getElementById('distanceCard').textContent = distText;
  document.getElementById('coordsText').textContent = `LAT/LNG: ${myGPS.lat.toFixed(5)}, ${myGPS.lng.toFixed(5)}`;
  document.getElementById('roomText').textContent = `SALA ${activeRoomCode}`;

  const banner = document.getElementById('dangerBanner');
  if (currentDistance < 90) banner.classList.add('show');
  else banner.classList.remove('show');
}

function publishMyPosition() {
  if (!gpsActive || !activeRoomCode) return;
  db.ref(`rooms/${activeRoomCode}/${deviceId}`).set({
    lat: myGPS.lat,
    lng: myGPS.lng,
    speed: Number(mySpeed) || 0,
    heading: Number(myHeading) || 0,
    updatedAt: Date.now()
  });
}

function startRealtimePublishing() {
  if (publishTimer) clearInterval(publishTimer);
  publishTimer = setInterval(() => publishMyPosition(), 3000);
}

function subscribeToRoom() {
  if (roomRef && roomListener) roomRef.off('value', roomListener);
  roomRef = db.ref(`rooms/${activeRoomCode}`);
  roomListener = (snapshot) => {
    const data = snapshot.val() || {};
    const otherDevice = Object.keys(data).find((id) => id !== deviceId);
    if (!otherDevice) {
      otherGPS = null;
      carB.x = 9999;
      carB.y = 9999;
      currentDistance = 999;
      updateStateAndDraw();
      return;
    }

    const payload = data[otherDevice];
    if (!payload || typeof payload.lat !== 'number' || typeof payload.lng !== 'number') return;
    if (lastOtherFix) {
      const moved = haversineMeters(lastOtherFix.lat, lastOtherFix.lng, payload.lat, payload.lng);
      if (moved > 1.2) {
        otherHeading = bearingDeg(lastOtherFix.lat, lastOtherFix.lng, payload.lat, payload.lng);
      }
    }

    lastOtherFix = { lat: payload.lat, lng: payload.lng };
    otherGPS = { lat: payload.lat, lng: payload.lng };
    remoteSpeed = Number(payload.speed) || 0;
    if (typeof payload.heading === 'number' && Number.isFinite(payload.heading)) {
      otherHeading = normalizeAngle(payload.heading);
    }
    updateStateAndDraw(); // redibujo inmediato al llegar Firebase
  };
  roomRef.on('value', roomListener);
}

function joinRoom() {
  const input = document.getElementById('roomCodeInput');
  const value = (input.value || '').trim();
  if (!/^\d{4}$/.test(value)) return;
  activeRoomCode = value;
  subscribeToRoom();
  publishMyPosition();
  updateOverlay();
}

function roundRectPath(x, y, width, height, radius) {
  const r = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + width - r, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + r);
  ctx.lineTo(x + width, y + height - r);
  ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
  ctx.lineTo(x + r, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawRoadMap(cx, cy, scale) {
  const roadW = 22 * scale;
  const roadLen = Math.max(canvas.clientWidth, canvas.clientHeight) * 1.6;
  const sidewalk = 30 * scale;

  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate((-myHeading * Math.PI) / 180);
  ctx.translate(-cx, -cy);

  ctx.fillStyle = '#111111';
  roundRectPath(cx - sidewalk / 2, cy - roadLen / 2, sidewalk, roadLen, 16 * scale);
  ctx.fill();
  roundRectPath(cx - roadLen / 2, cy - sidewalk / 2, roadLen, sidewalk, 16 * scale);
  ctx.fill();

  ctx.fillStyle = '#1a3a5c';
  roundRectPath(cx - roadW / 2, cy - roadLen / 2, roadW, roadLen, 13 * scale);
  ctx.fill();
  roundRectPath(cx - roadLen / 2, cy - roadW / 2, roadLen, roadW, 13 * scale);
  ctx.fill();

  ctx.strokeStyle = '#0d2a4a';
  ctx.lineWidth = Math.max(2, 2.2 * scale);
  roundRectPath(cx - roadW / 2, cy - roadLen / 2, roadW, roadLen, 13 * scale);
  ctx.stroke();
  roundRectPath(cx - roadLen / 2, cy - roadW / 2, roadLen, roadW, 13 * scale);
  ctx.stroke();

  ctx.fillStyle = '#1e4a7a';
  roundRectPath(cx - roadW / 1.85, cy - roadW / 1.85, roadW * 1.08, roadW * 1.08, 18 * scale);
  ctx.fill();
  ctx.restore();
}

function drawCarIcon(x, y, headingDeg, color, label) {
  const size = Math.max(12, canvas.clientWidth * 0.016);
  const width = size;
  const height = size * 1.9;
  const corner = size * 0.24;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate((headingDeg * Math.PI) / 180);

  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 2.8);
  glow.addColorStop(0, color + '66');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, size * 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = color;
  roundRectPath(-width / 2, -height / 2, width, height, corner);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  roundRectPath(-width * 0.28, -height * 0.22, width * 0.56, height * 0.22, size * 0.08);
  ctx.fill();

  ctx.restore();

  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${Math.max(9, canvas.clientWidth * 0.011)}px Orbitron`;
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y - size * 1.35);
}

function updateStateAndDraw() {
  carA.x = 0;
  carA.y = 0;
  carA.heading = myHeading;

  if (otherGPS) {
    const delta = gpsDeltaMeters(myGPS.lat, myGPS.lng, otherGPS.lat, otherGPS.lng);
    carB.x = delta.east;
    carB.y = delta.north;
    carB.heading = otherHeading;
    currentDistance = haversineMeters(myGPS.lat, myGPS.lng, otherGPS.lat, otherGPS.lng);
  } else {
    carB.x = 9999;
    carB.y = 9999;
    currentDistance = 999;
  }

  currentRisk = calcRisk(currentDistance);
  updateOverlay();
  drawMap();
}

function drawMap() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const cx = w / 2;
  const cy = h / 2;
  const pxPerMeter = (Math.min(w, h) * 0.46) / RANGE_M;

  ctx.clearRect(0, 0, w, h);
  drawRoadMap(cx, cy, Math.min(w, h) / 500);

  drawCarIcon(cx, cy, myHeading, '#4fc3f7', 'VOS');

  if (Math.abs(carB.x) < RANGE_M * 3 && Math.abs(carB.y) < RANGE_M * 3) {
    const bx = cx + carB.x * pxPerMeter;
    const by = cy - carB.y * pxPerMeter;
    drawCarIcon(bx, by, otherHeading, '#ef5350', 'AUTO B');

    if (currentDistance < 130) {
      ctx.strokeStyle = currentDistance < 90 ? 'rgba(239,83,80,0.72)' : 'rgba(255,255,255,0.34)';
      ctx.lineWidth = 1.4;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(bx, by);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function runAudioAlerts(nowMs) {
  if (!audioUnlocked || !audioCtx) return;
  if (currentDistance >= 90) return;
  if (nowMs < nextBeepAt) return;

  const urgent = currentDistance < 30;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = urgent ? 'square' : 'sine';
  osc.frequency.value = urgent ? 1480 : 960;
  gain.gain.value = urgent ? 0.12 : 0.07;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const t0 = audioCtx.currentTime;
  osc.start(t0);
  osc.stop(t0 + (urgent ? 0.07 : 0.11));
  nextBeepAt = nowMs + (urgent ? 200 : 720);
}

function maybeVibrate(nowMs) {
  if (currentDistance >= 30 || !navigator.vibrate) return;
  const slot = Math.floor(nowMs / 850);
  if (slot === maybeVibrate.lastSlot) return;
  maybeVibrate.lastSlot = slot;
  navigator.vibrate([90, 45, 120]);
}
maybeVibrate.lastSlot = -1;

function frame(now) {
  runAudioAlerts(now);
  maybeVibrate(now);
  rafId = requestAnimationFrame(frame);
}

function setupAudioUnlock() {
  const button = document.getElementById('soundBtn');
  button.addEventListener('click', async () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state !== 'running') await audioCtx.resume();
    audioUnlocked = true;
    button.classList.add('enabled');
    button.textContent = 'SONIDO ACTIVO';
  });
}

function setupGPS() {
  const gpsStatus = document.getElementById('gpsStatus');
  if (!navigator.geolocation) {
    gpsStatus.textContent = 'GPS NO SOPORTADO';
    return;
  }

  navigator.geolocation.watchPosition((pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    gpsActive = true;

    if (lastMyFix) {
      const moved = haversineMeters(lastMyFix.lat, lastMyFix.lng, lat, lng);
      if (moved > 1.2) myHeading = bearingDeg(lastMyFix.lat, lastMyFix.lng, lat, lng);
    }

    lastMyFix = { lat, lng };
    myGPS.lat = lat;
    myGPS.lng = lng;
    mySpeed = Number.isFinite(pos.coords.speed) && pos.coords.speed >= 0
      ? pos.coords.speed * 3.6
      : 0;
    gpsStatus.textContent = 'GPS ACTIVO';

    publishMyPosition(); // publica con cada cambio detectado
    updateStateAndDraw();
  }, () => {
    gpsStatus.textContent = 'GPS SIN SENAL';
  }, {
    enableHighAccuracy: true,
    maximumAge: 1200,
    timeout: 12000
  });
}

function cleanUp() {
  if (publishTimer) clearInterval(publishTimer);
  if (rafId) cancelAnimationFrame(rafId);
  if (activeRoomCode) db.ref(`rooms/${activeRoomCode}/${deviceId}`).remove();
}

window.addEventListener('beforeunload', cleanUp);

setupAudioUnlock();
setupGPS();
subscribeToRoom();
startRealtimePublishing(); // backup cada 3 segundos
resizeCanvas();
updateOverlay();
rafId = requestAnimationFrame(frame);
</script>
</body>
</html>
